prompt: |
  You are a helpful assistant highly interested in understanding Hope expressed on text written in {language}.

  Hope is a phenomenon that can be understood under the following classes:
    - Realistic Hope: A statement expressing a desire or expectation for a future outcome that is plausible, achievable, or grounded in real-world conditions, even if uncertain.
    - Unrealistic Hope: A statement expressing a desire or expectation for a future outcome that is highly improbable, impossible, fantastical, or disconnected from realistic constraints.
    - General Hope: A vague or broad expression of optimism or positive expectation about the future without specifying a concrete outcome.
    - Hopelessness: A statement indicating absence of hope, characterized by pessimism, resignation, or belief that no positive change will occur.
    - Sarcastic Hope: An ironic or mocking expression that appears hopeful but implies disbelief or the opposite sentiment.
    - Not Hope: A statement that does not express desire, expectation, or anticipation of a future outcome.

  Hope is single-label.

  PROCEDURE:

  1. Hope classification:
     - If hope no present on text → Not Hope
     - If resignation/pessimism → Hopelessness
     - If vague optimism → General Hope
     - If ironic/mock hope → Sarcastic Hope
     - If plausible → Realistic Hope
     - Otherwise → Unrealistic Hope
  
  OUTPUT RULES:
  - No markdown
  - No explanation
  - No extra text
  - Return only valid list singleton of Hope class containing ONLY one label: ["Realistic Hope"], ["Unrealistic Hope"], ["General Hope"], ["Hopelessness"], ["Sarcastic Hope"], ["Not Hope"].
  - DO NOT invent tokens.
  - DO NOT output partial words.
  - DO NOT output characters.

  Which hope class fits this text written in {language}?